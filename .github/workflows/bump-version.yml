name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set (format: MAJOR.MINOR.PATCH, e.g., 8.4.8)'
        required: true
        type: string
      skip_nightly_check:
        description: 'Skip nightly build status check'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'Version to set (format: MAJOR.MINOR.PATCH, e.g., 8.4.8)'
        required: true
        type: string
      skip_nightly_check:
        description: 'Skip nightly build status check'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: bump-version
  cancel-in-progress: false


jobs:
  validate-and-check:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      release_branch: ${{ steps.derive-branch.outputs.release_branch }}
    steps:
      - name: Validate version format and derive release branch
        id: derive-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION. Expected format: MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "Version format validated: $VERSION"
          RELEASE_BRANCH=$(echo "$VERSION" | cut -d. -f1,2)
          echo "Derived release branch: $RELEASE_BRANCH"
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Check nightly build status on release branch
        if: ${{ !inputs.skip_nightly_check }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.derive-branch.outputs.release_branch }}
        run: |
          echo "Checking nightly build status for branch: $BRANCH"

          WORKFLOW_RUNS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/event-nightly.yml/runs?branch=$BRANCH&per_page=1" \
            --jq '.workflow_runs[0]')

          if [ -z "$WORKFLOW_RUNS" ] || [ "$WORKFLOW_RUNS" == "null" ]; then
            echo "::warning::No nightly workflow runs found for branch $BRANCH"
            exit 0
          fi

          STATUS=$(echo "$WORKFLOW_RUNS" | jq -r '.conclusion // "in_progress"')
          RUN_URL=$(echo "$WORKFLOW_RUNS" | jq -r '.html_url')

          echo "Latest nightly run: $RUN_URL"

          if [ "$STATUS" != "success" ]; then
            echo "::error::Latest nightly build did not succeed (status: $STATUS). Use 'skip_nightly_check' to override."
            exit 1
          fi

          echo "Nightly build passed!"

  bump-version:
    needs: validate-and-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-and-check.outputs.release_branch }}
          path: release-branch
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag already exists
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists on remote"
            exit 1
          fi
          echo "Tag v$VERSION does not exist, proceeding..."

      - name: Configure Git
        working-directory: release-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set version
        shell: python
        env:
          VERSION: ${{ inputs.version }}
        run: |
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ['VERSION']
          major, minor, patch = version.split('.')
          version_file = Path('release-branch/redis_json/Cargo.toml')

          if not version_file.exists():
              print(f"::error::Version file not found: {version_file}")
              sys.exit(1)

          content = version_file.read_text()
          current = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', content)
          if current:
              print(f"Current version: {current.group(1)}.{current.group(2)}.{current.group(3)}")

          content = re.sub(
              r'version = "\d+\.\d+\.\d+"',
              f'version = "{major}.{minor}.{patch}"',
              content,
              count=1
          )
          version_file.write_text(content)
          print(f"Updated to version {major}.{minor}.{patch}")

      - name: Commit version bump
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add redis_json/Cargo.toml
          git commit -m "bump version v$VERSION"

      - name: Create annotated tag
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -a "v$VERSION" -m "Automated bump to v$VERSION"
          echo "Created tag v$VERSION"

      - name: Push changes
        if: ${{ !inputs.dry_run }}
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
        run: |
          echo "Pushing commit to branch $RELEASE_BRANCH..."
          git push origin "$RELEASE_BRANCH"
          echo "Pushing tag v$VERSION..."
          git push origin "v$VERSION"

      - name: Verify push
        if: ${{ !inputs.dry_run }}
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! git ls-remote --exit-code origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION was not found on remote after push"
            exit 1
          fi
          echo "✓ Tag v$VERSION successfully pushed to remote"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
        run: |
          echo "## 🏃 Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** $RELEASE_BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Version file updated (not pushed)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Commit created (not pushed)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Tag created (not pushed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** This was a dry run. No changes were pushed to the repository." >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
        run: |
          echo "## ✅ Version Bump Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** $RELEASE_BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** https://github.com/${{ github.repository }}/releases/tag/v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Version file updated" >> $GITHUB_STEP_SUMMARY
          echo "✓ Changes committed and pushed" >> $GITHUB_STEP_SUMMARY
          echo "✓ Tag v$VERSION created and pushed" >> $GITHUB_STEP_SUMMARY


